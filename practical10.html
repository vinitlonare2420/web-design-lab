<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical 10 - Iframe Selector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .box-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .box {
            width: 150px;
            height: 100px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .box.wiki {
            background-color: #3366CC;
        }

        .box.wiki:hover {
            background-color: #254b99;
        }

        .box.youtube {
            background-color: #FF0000;
        }

        .box.youtube:hover {
            background-color: #cc0000;
        }

        .box.map {
            background-color: #34A853;
            /* Google Green for Maps */
        }

        .box.map:hover {
            background-color: #2d8f47;
        }

        .iframe-container {
            display: flex;
            justify-content: center;
        }

        iframe {
            border: 2px solid #ccc;
            border-radius: 10px;
            width: 80%;
            max-width: 1000px;
            height: 500px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <h1>Select a Site to View</h1>

    <div class="box-container">
        <!-- Using target to change iframe source without JS. Note: YouTube needs an embed URL to work in an iframe -->
        <a href="https://en.wikipedia.org/wiki/Main_Page" target="main-iframe" class="box wiki" style="text-decoration: none;">Wikipedia</a>
        <a href="https://www.youtube.com/embed/dQw4w9WgXcQ" target="main-iframe" class="box youtube" style="text-decoration: none;">YouTube</a>
        <a href="https://www.google.com/maps?q=Nagpur&output=embed" target="main-iframe" class="box map" style="text-decoration: none;">Map</a>
    </div>

    <div class="iframe-container">
        <iframe name="main-iframe" src="about:blank" allowfullscreen loading="lazy" title="Content Iframe"></iframe>
    </div>
</body>

</html>
