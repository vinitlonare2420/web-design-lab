<!DOCTYPE html>
<html>
<head>
    <title>My Einstein Project</title>
    <style>
        body {
            background-color: black; /* Changed my favorite color! */
            font-family: "Comic Sans MS", cursive;
            text-align: center;
        }
        #main {
            background: white;
            margin: auto;
            padding: medium;
        }
        img {
            width: auto;
            border: medium solid green;
        }
        h1 {
            color: purple;
            text-decoration: underline;
            font-size: xx-large;
        }
        .list-box {
            background: lightyellow;
            display: inline-block;
            text-align: left;
            border: thin solid black;
        }
        li {
            font-size: large;
        }
    </style>
</head>
<body>

    <div id="main">
        <h1>✨ ALBERT EINSTEIN ✨</h1>
        <p><b>He was a super smart genius!</b></p>

        <div id="img-div">
            <img id="image" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Einstein_1921_by_F_Schmutzer_-_restoration.jpg">
            <p><i>This is him in 1921!</i></p>
        </div>
        <h3>Something about him:</h3>
        <div class="list-box">
            <ul>
                <li>He won the Nobel Prize! 🏆</li>
                <li>famous formula</li>
                <li>E = mc^2 </li>
                <li>He give theory space and time.</li>
            </ul>
        </div>
        <p><b>The End!</b></p>
    </div>
</body>
</html>
